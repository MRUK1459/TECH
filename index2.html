<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Live Update</title>
    <style>
        body { background: #000; color: white; font-family: 'Roboto', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px 10px; }
        .admin-box { background: #111; padding: 30px; border-radius: 15px; border: 1px dashed #ff0000; width: 90%; max-width: 400px; text-align: center; }
        .admin-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; box-sizing: border-box; }
        .admin-btn { width: 100%; padding: 12px; background: #008cff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .status { color: #00ff00; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="admin-box">
        <h2 style="color: #ff0000;">Admin Dashboard</h2>
        <select id="targetSubject" class="admin-input"><option value="bio">Bio</option><option value="stats">Stats</option></select>
        <input type="text" id="newVidTitle" class="admin-input" placeholder="Title (Day 08)">
        <input type="text" id="newVidId" class="admin-input" placeholder="YouTube Video ID">
        <button class="admin-btn" onclick="addNewVideo()">Add Now</button>
        <p id="statusMsg" class="status">Added Successfully!</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyApozqbVy4DFupEKafsU_oeC9RUAq1ljuU",
        authDomain: "tech-590c8.firebaseapp.com",
        databaseURL: "https://tech-590c8-default-rtdb.firebaseio.com",
        projectId: "tech-590c8",
        storageBucket: "tech-590c8.firebasestorage.app",
        messagingSenderId: "379663698743",
        appId: "1:379663698743:web:7fba89d9f7b231ca6828b2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function addNewVideo() {
        const sub = document.getElementById("targetSubject").value;
        const title = document.getElementById("newVidTitle").value;
        const id = document.getElementById("newVidId").value;
        if (title && id) {
            db.ref("studyData/" + sub).once("value").then((snapshot) => {
                let list = snapshot.val() || [];
                list.push({ id: id, title: title });
                db.ref("studyData/" + sub).set(list).then(() => {
                    document.getElementById("statusMsg").style.display = "block";
                    setTimeout(() => { document.getElementById("statusMsg").style.display = "none"; }, 3000);
                    document.getElementById("newVidTitle").value = "";
                    document.getElementById("newVidId").value = "";
                });
            });
        }
    }
</script>
</body>
</html>
