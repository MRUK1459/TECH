<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Add Recordings</title>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
        .admin-box { background: #111; padding: 30px; border-radius: 15px; border: 1px solid #ff0000; width: 400px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; box-sizing: border-box; }
        input, select { background: #1a1a1a; color: white; }
        button { background: #ff0000; color: white; font-weight: bold; cursor: pointer; border: none; }
        .msg { color: #00ff00; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2 style="color:#ff0000; text-align: center;">Admin Panel</h2>
    <label>විෂය තෝරන්න:</label>
    <select id="sub">
        <option value="bio">ජෛව රසායනය (Bio)</option>
        <option value="stats">සංඛ්‍යානය (Stats)</option>
    </select>
    
    <label>වීඩියෝවේ නම:</label>
    <input type="text" id="title" placeholder="Ex: ජෛව රසායනය - Day 08">
    
    <label>YouTube Video ID:</label>
    <input type="text" id="vidId" placeholder="Ex: 9wKjkB0OUCA">
    
    <button onclick="saveToIndex()">Index එකට ඇතුළත් කරන්න</button>
    <p id="status" class="msg">සාර්ථකව ඇතුළත් කළා!</p>
</div>

<script>
    function saveToIndex() {
        const sub = document.getElementById("sub").value;
        const title = document.getElementById("title").value;
        const id = document.getElementById("vidId").value;

        if(!title || !id) { alert("කරුණාකර විස්තර පුරවන්න!"); return; }

        // දැනට තියෙන දත්ත ලබා ගැනීම
        let allData = JSON.parse(localStorage.getItem("studyData")) || { bio: [], stats: [] };
        
        // අලුත් එක ඇතුලත් කිරීම
        allData[sub].push({ id: id, title: title });
        
        // නැවත Save කිරීම
        localStorage.setItem("studyData", JSON.stringify(allData));

        document.getElementById("status").style.display = "block";
        setTimeout(() => { document.getElementById("status").style.display = "none"; }, 3000);
        
        document.getElementById("title").value = "";
        document.getElementById("vidId").value = "";
    }
</script>
</body>
</html>
