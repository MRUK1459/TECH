<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Tech Admin - Lessons & Videos</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0b0b0b; color: white; font-family: 'Roboto', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #ff0000; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        .card { background: #111; border: 1px solid #222; padding: 25px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #ff0000; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; font-size: 14px; outline: none; }
        input:focus, textarea:focus { border-color: #ff0000; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; background: #ff0000; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.3s; }
        button:hover { background: #cc0000; transform: translateY(-2px); }
        .secondary-btn { background: #333; }
        .secondary-btn:hover { background: #444; }
        
        .lesson-box { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-top: 10px; border-left: 5px solid #ff0000; }
        .video-list-item { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px solid #222; color: #bbb; }
        .del-btn { color: #ff0000; cursor: pointer; font-weight: bold; border: none; background: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Tech Admin Panel</h1>
    
    <div class="card">
        <label>විෂය ධාරාව තෝරන්න (Select Stream)</label>
        <select id="streamSelect" onchange="loadLessons()">
            <option value="et">Engineering Technology (ET)</option>
            <option value="sft">Science for Technology (SFT)</option>
        </select>

        <label>නව පාඩමක් ඇතුළත් කරන්න (Create New Lesson)</label>
        <div class="btn-group">
            <input type="text" id="newLessonName" placeholder="උදා: ඉලෙක්ට්‍රොනික්ස් / ජෛව පද්ධති">
            <button style="max-width: 150px;" onclick="createNewLesson()">පාඩම සාදන්න</button>
        </div>
    </div>

    <div class="card">
        <label>පාඩම තෝරන්න (Select Lesson)</label>
        <select id="lessonSelect">
            <option value="">පළමුව විෂය තෝරන්න...</option>
        </select>

        <label>වීඩියෝ දත්ත (Bulk Data: Title & Link)</label>
        <textarea id="bulkData" rows="8" placeholder="වීඩියෝවේ නම&#10;https://youtube.com/embed/..."></textarea>
        
        <button onclick="uploadVideos()">වීඩියෝ පාඩමට එක් කරන්න</button>
    </div>

    <div class="card">
        <h3>දැනට පවතින පාඩම් සහ වීඩියෝ</h3>
        <div id="displayArea">පූරණය වේ...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyApozqbVy4DFupEKafsU_oeC9RUAq1ljuU",
        authDomain: "tech-590c8.firebaseapp.com",
        databaseURL: "https://tech-590c8-default-rtdb.firebaseio.com",
        projectId: "tech-590c8",
        storageBucket: "tech-590c8.firebasestorage.app",
        messagingSenderId: "379663698743",
        appId: "1:379663698743:web:7fba89d9f7b231ca6828b2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // නව පාඩමක් නිර්මාණය කිරීම
    async function createNewLesson() {
        const stream = document.getElementById("streamSelect").value;
        const lessonName = document.getElementById("newLessonName").value.trim();
        if (!lessonName) return alert("පාඩමේ නම ඇතුළත් කරන්න!");

        // Firebase හි පාඩම නමින්ම Key එකක් සාදයි
        await db.ref(`studyData/${stream}/${lessonName}`).set({ created: Date.now() });
        alert("නව පාඩම සාර්ථකව නිර්මාණය කළා!");
        document.getElementById("newLessonName").value = "";
    }

    // විෂය අනුව පාඩම් ලැයිස්තුව Dropdown එකට ගැනීම
    function loadLessons() {
        const stream = document.getElementById("streamSelect").value;
        db.ref(`studyData/${stream}`).on("value", (snapshot) => {
            const lessons = snapshot.val();
            const select = document.getElementById("lessonSelect");
            select.innerHTML = '<option value="">පාඩමක් තෝරන්න...</option>';
            if (lessons) {
                Object.keys(lessons).forEach(lesson => {
                    let opt = document.createElement("option");
                    opt.value = lesson; opt.innerText = lesson;
                    select.appendChild(opt);
                });
            }
        });
    }

    // වීඩියෝ ID එක වෙන් කරගැනීම
    function extractVideoID(url) {
        const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
        const match = url.trim().match(regExp);
        return (match && match[7].length === 11) ? match[7] : null;
    }

    // වීඩියෝ Upload කිරීම
    async function uploadVideos() {
        const stream = document.getElementById("streamSelect").value;
        const lesson = document.getElementById("lessonSelect").value;
        const rawText = document.getElementById("bulkData").value;
        
        if (!lesson || !rawText) return alert("පාඩම සහ වීඩියෝ විස්තර ඇතුළත් කරන්න!");

        const lines = rawText.split('\n');
        let currentTitle = "";
        let count = 0;

        for (let line of lines) {
            line = line.trim();
            if (line === "") continue;
            if (line.includes("http")) {
                const vidId = extractVideoID(line);
                if (vidId && currentTitle) {
                    await db.ref(`studyData/${stream}/${lesson}/videos`).push({ id: vidId, title: currentTitle });
                    count++;
                    currentTitle = "";
                }
            } else { currentTitle = line; }
        }
        alert(`වීඩියෝ ${count} ක් '${lesson}' පාඩමට එක් කළා!`);
        document.getElementById("bulkData").value = "";
    }

    // කළමනාකරණ ප්‍රදේශය පෙන්වීම
    db.ref("studyData").on("value", (snapshot) => {
        const data = snapshot.val();
        const display = document.getElementById("displayArea");
        display.innerHTML = "";
        if (!data) return display.innerHTML = "දත්ත නැත.";

        for (let stream in data) {
            for (let lesson in data[stream]) {
                const lessonBox = document.createElement("div");
                lessonBox.className = "lesson-box";
                lessonBox.innerHTML = `<strong>[${stream.toUpperCase()}] ${lesson}</strong> 
                <button class="del-btn" style="float:right" onclick="deleteLesson('${stream}','${lesson}')">Delete Lesson</button>`;
                
                const videos = data[stream][lesson].videos;
                if (videos) {
                    for (let vidKey in videos) {
                        const v = videos[vidKey];
                        lessonBox.innerHTML += `<div class="video-list-item"><span>• ${v.title}</span> 
                        <span class="del-btn" onclick="deleteVideo('${stream}','${lesson}','${vidKey}')">X</span></div>`;
                    }
                }
                display.appendChild(lessonBox);
            }
        }
    });

    function deleteLesson(s, l) { if(confirm("මෙම පාඩම සහ එහි සියලු වීඩියෝ මකන්නද?")) db.ref(`studyData/${s}/${l}`).remove(); }
    function deleteVideo(s, l, v) { if(confirm("මෙම වීඩියෝව මකන්නද?")) db.ref(`studyData/${s}/${l}/videos/${v}`).remove(); }

    window.onload = loadLessons;
</script>
</body>
</html>
