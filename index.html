<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Study Portal - No Flicker Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #f0f4f8;
            --card-blue: #0A1FFF;
            --highlight-green: #37FF00;
            --text-dark: #1a1a1a;
            --font-main: 'Poppins', sans-serif;
        }

        body { 
            background: var(--primary-bg); 
            margin: 0; padding: 0; 
            font-family: var(--font-main); 
            color: var(--text-dark); 
            overflow-x: hidden;
            /* Reload එකේදී flicker වීම වැලැක්වීමට මුලින්ම සඟවා තබයි */
            visibility: hidden; 
        }

        /* --- Login Overlay --- */
        #loginOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fff; z-index: 999999; 
            display: none; align-items: center; justify-content: center; 
        }
        .login-box { 
            background: #fff; padding: 30px; border-radius: 30px; width: 85%; max-width: 380px; 
            text-align: center; box-shadow: 0 15px 40px rgba(10,31,255,0.1); border: 1px solid #eee;
        }
        .login-box input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #ddd; outline: none; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 16px; background: var(--card-blue); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }

        /* --- Page Layouts --- */
        .page-section { display: none; width: 100%; box-sizing: border-box; }

        /* --- Subject Menu --- */
        #subjectMenu { 
            height: 100vh; flex-direction: column; align-items: center; justify-content: center; 
            background: var(--card-blue); position: relative; padding: 20px;
        }
        #subjectMenu::before { 
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 60%; 
            background-color: var(--primary-bg); border-radius: 0 0 50% 50% / 0 0 10% 10%; 
        }
        #subjectMenu h2 { position: relative; z-index: 2; color: #0022ff; font-weight: 700; margin-bottom: 30px; text-align: center; font-size: clamp(20px, 5vw, 26px); }
        
        .menu-card { 
            width: 100%; max-width: 400px; padding: clamp(15px, 4vw, 22px); 
            background: #ffffff; border-radius: 20px; 
            cursor: pointer; margin-bottom: 20px; position: relative; z-index: 2; 
            display: flex; align-items: center; gap: 15px; 
            color: #0022ff; font-weight: 600; font-size: clamp(16px, 4vw, 18px);
            transition: 0.3s; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border: 2px solid transparent;
            box-sizing: border-box;
        }
        .menu-card:hover { background: var(--highlight-green); color: #000; transform: translateY(-5px); }
        .menu-card i { font-size: clamp(28px, 6vw, 35px); background: rgba(10, 31, 255, 0.05); padding: 8px; border-radius: 12px; }

        /* --- Lesson Menu --- */
        #lessonMenu { min-height: 100vh; padding: 40px 20px; flex-direction: column; align-items: center; }
        .lesson-card { 
            width: 100%; max-width: 550px; background: #fff; padding: 18px; margin-bottom: 12px; 
            border-radius: 15px; border-left: 6px solid var(--card-blue); cursor: pointer; 
            display: flex; align-items: center; justify-content: space-between; transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); box-sizing: border-box;
        }

        /* --- Player Section --- */
        #mainContent { padding: 15px; max-width: 900px; margin: 0 auto; }
        #videoContainer { 
            position: relative; width: 100%; background: #000; 
            border-radius: 15px; overflow: hidden; aspect-ratio: 16 / 9; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 20px; 
        }
        #player { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .click-layer { position: absolute; top: 0; left: 0; width: 100%; height: 80%; z-index: 10; cursor: pointer; }

        .custom-controls { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 15px; display: flex; flex-direction: column; z-index: 999; transition: 0.4s; }
        .custom-controls.hidden { opacity: 0; pointer-events: none; }
        .seek-bar-container { width: 100%; height: 12px; display: flex; align-items: center; cursor: pointer; margin-bottom: 10px; }
        .seek-bar-slider { width: 100%; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; position: relative; }
        .seek-bar-progress { height: 100%; background: var(--highlight-green); width: 0%; border-radius: 2px; }
        .seek-bar-knob { width: 14px; height: 14px; background: #fff; border-radius: 50%; position: absolute; top: 50%; transform: translate(-50%, -50%); left: 0%; }

        .time-row { display: flex; align-items: center; justify-content: space-between; color: #fff; flex-wrap: wrap; gap: 10px; }
        .controls-left { display: flex; align-items: center; gap: 15px; }
        .icon-btn .material-icons { font-size: clamp(30px, 8vw, 38px); }
        .icon-btn { background: none; border: none; color: #fff; cursor: pointer; padding: 5px; }
        .select-style { background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 5px; border-radius: 5px; font-size: 12px; }

        .playlist-container { background: #fff; border-radius: 15px; padding: 15px; margin-top: 10px; }
        .playlist-item { padding: 12px; margin-bottom: 8px; background: #f9f9f9; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 14px; }
        .playlist-item.active { border: 2px solid var(--card-blue); background: #eef3ff; color: var(--card-blue); font-weight: 600; }
        .item-index { background: var(--card-blue); color: #fff; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 11px; flex-shrink: 0; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color:var(--card-blue)">Study Portal</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="checkLogin()">ඇතුල් වන්න</button>
        </div>
    </div>

    <div id="subjectMenu" class="page-section">
        <h2>විෂය ධාරාව තෝරන්න</h2>
        <div class="menu-card" onclick="navigateTo('lessons', 'et')">
            <i class="material-icons">engineering</i> <span>Engineering Tech (ET)</span>
        </div>
        <div class="menu-card" onclick="navigateTo('lessons', 'sft')">
            <i class="material-icons">science</i> <span>Science for Tech (SFT)</span>
        </div>
    </div>

    <div id="lessonMenu" class="page-section">
        <h2 id="lessonMenuTitle" style="color:var(--card-blue); text-align: center; margin-bottom: 20px;">පාඩම් මාලාව</h2>
        <div id="lessonListContainer" style="width:100%"></div>
    </div>

    <div id="mainContent" class="page-section">
        <div id="videoContainer">
            <div id="player"></div>
            <div class="click-layer" onclick="handleTap()"></div>
            <div class="custom-controls" id="controlBar">
                <div class="seek-bar-container" onclick="handleSeek(event)">
                    <div class="seek-bar-slider"><div class="seek-bar-progress" id="seekBarProgress"></div><div class="seek-bar-knob" id="seekBarKnob"></div></div>
                </div>
                <div class="time-row">
                    <div class="controls-left">
                        <button class="icon-btn" onclick="togglePlay(event)"><i class="material-icons" id="playIcon">play_arrow</i></button>
                        <div style="font-size:12px;"><span id="currentTime">00:00</span> / <span id="duration">00:00</span></div>
                    </div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <select class="select-style" id="speed" onchange="setSpeed(event)">
                            <option value="0.5">0.5x</option><option value="1" selected>1.0x</option><option value="1.5">1.5x</option><option value="2.0">2.0x</option>
                        </select>
                        <button class="icon-btn" onclick="toggleFullScreen(event)"><i class="material-icons">fullscreen</i></button>
                    </div>
                </div>
            </div>
        </div>
        <div class="playlist-container">
            <h3 style="color:var(--card-blue); margin-top:0; font-size:16px;">වීඩියෝ පටුන</h3>
            <div id="playlist"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApozqbVy4DFupEKafsU_oeC9RUAq1ljuU",
            authDomain: "tech-590c8.firebaseapp.com",
            databaseURL: "https://tech-590c8-default-rtdb.firebaseio.com",
            projectId: "tech-590c8",
            storageBucket: "tech-590c8.firebasestorage.app",
            messagingSenderId: "379663698743",
            appId: "1:379663698743:web:7fba89d9f7b231ca6828b2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allData = {}, videoData = [], player, hideTimeout;

        // --- වැදගත්ම කොටස: Flickering වැලැක්වීම ---
        function initApp() {
            const loggedIn = localStorage.getItem("isLoggedIn");
            if (loggedIn === "true") {
                document.getElementById("loginOverlay").style.display = "none";
                // History එක අනුව පිටුව පෙන්වන්න
                if (history.state) renderPage(history.state);
                else renderPage({page: 'subjects'});
            } else {
                document.getElementById("loginOverlay").style.display = "flex";
            }
            // දැන් මුළු Body එකම පෙන්වන්න
            document.body.style.visibility = "visible";
        }

        db.ref("studyData").on("value", s => { 
            allData = s.val() || {}; 
            // පළමු වරට දත්ත ලැබුණු විට App එක ආරම්භ කරන්න
            initApp();
        });

        window.onpopstate = (event) => {
            stopVideo();
            if (event.state) renderPage(event.state);
            else renderPage({page: 'subjects'});
        };

        function stopVideo() {
            if (player && player.stopVideo) player.stopVideo();
        }

        function navigateTo(page, param1 = '', param2 = '', push = true) {
            stopVideo();
            const state = { page, param1, param2 };
            if(push) history.pushState(state, '', '');
            renderPage(state);
        }

        function renderPage(state) {
            if(localStorage.getItem("isLoggedIn") !== "true") return;
            document.querySelectorAll('.page-section').forEach(s => s.style.display = 'none');

            if(state.page === 'subjects') document.getElementById("subjectMenu").style.display = "flex";
            else if(state.page === 'lessons') showLessonsUI(state.param1);
            else if(state.page === 'player') startPlayerUI(state.param1, state.param2);
        }

        function showLessonsUI(stream) {
            document.getElementById("lessonMenu").style.display = "flex";
            const cont = document.getElementById("lessonListContainer");
            cont.innerHTML = "";
            if(allData[stream]) {
                Object.keys(allData[stream]).forEach(l => {
                    let div = document.createElement("div"); div.className = "lesson-card";
                    div.innerHTML = `<span>${l}</span><i class="material-icons">arrow_forward_ios</i>`;
                    div.onclick = () => navigateTo('player', stream, l);
                    cont.appendChild(div);
                });
            }
        }

        function startPlayerUI(stream, lesson) {
            const lessonData = allData[stream] && allData[stream][lesson];
            videoData = lessonData && lessonData.videos ? Object.values(lessonData.videos) : [];
            document.getElementById("mainContent").style.display = "block";
            document.getElementById("videoContainer").style.display = "none";
            renderPlaylist();
        }

        function renderPlaylist() {
            const pl = document.getElementById("playlist"); pl.innerHTML = "";
            videoData.forEach((v, i) => {
                let div = document.createElement("div"); div.className = "playlist-item"; div.id = `vid-${i}`;
                div.innerHTML = `<div class="item-index">${i+1}</div> <span>${v.title}</span>`;
                div.onclick = () => loadVideo(i); pl.appendChild(div);
            });
        }

        function loadVideo(i) {
            document.getElementById("videoContainer").style.display = "block";
            const vidId = videoData[i].id;
            if(!player) {
                let tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
                document.body.appendChild(tag);
                window.onYouTubeIframeAPIReady = () => {
                    player = new YT.Player('player', { videoId: vidId, playerVars: { 'autoplay': 1, 'controls': 0 }, events: { 'onReady': onPlayerReady, 'onStateChange': onStateChange } });
                };
            } else player.loadVideoById(vidId);
            document.querySelectorAll('.playlist-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`vid-${i}`).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function onPlayerReady() { setInterval(updateUI, 500); showControls(); }
        function onStateChange(e) { document.getElementById("playIcon").innerText = e.data === 1 ? "pause" : "play_arrow"; if(e.data === 1) resetTimer(); else showControls(); }
        function handleTap() { const cb = document.getElementById("controlBar"); cb.classList.contains("hidden") ? showControls() : hideControls(); }
        function showControls() { document.getElementById("controlBar").classList.remove("hidden"); resetTimer(); }
        function hideControls() { if(player && player.getPlayerState() === 1) document.getElementById("controlBar").classList.add("hidden"); }
        function resetTimer() { clearTimeout(hideTimeout); if(player && player.getPlayerState() === 1) hideTimeout = setTimeout(hideControls, 4000); }
        function togglePlay(e) { e.stopPropagation(); if(player.getPlayerState() === 1) player.pauseVideo(); else player.playVideo(); }
        function setSpeed(e) { e.stopPropagation(); player.setPlaybackRate(parseFloat(e.target.value)); }
        function toggleFullScreen(e) { e.stopPropagation(); var container = document.getElementById("videoContainer"); if(!document.fullscreenElement) container.requestFullscreen(); else document.exitFullscreen(); }
        function handleSeek(e) { e.stopPropagation(); var rect = e.currentTarget.getBoundingClientRect(); player.seekTo(player.getDuration() * ((e.clientX - rect.left) / rect.width), true); }
        function updateUI() { if(player && player.getCurrentTime) { let curr = player.getCurrentTime(), dur = player.getDuration(); document.getElementById("currentTime").innerText = formatTime(curr); document.getElementById("duration").innerText = formatTime(dur); if(dur > 0) { let p = (curr / dur) * 100; document.getElementById("seekBarProgress").style.width = p + "%"; document.getElementById("seekBarKnob").style.left = p + "%"; } } }
        function formatTime(t) { t = Math.round(t); var m = Math.floor(t / 60); var s = t % 60; return (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s); }
        function checkLogin() { if(document.getElementById("username").value === "Ulindu" && document.getElementById("password").value === "2007") { localStorage.setItem("isLoggedIn", "true"); initApp(); } }
    </script>
</body>
</html>
