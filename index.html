<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Study Portal - Final Pro Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #f0f4f8;
            --card-blue: #0A1FFF;
            --highlight-green: #37FF00;
            --text-dark: #1a1a1a;
            --font-main: 'Poppins', sans-serif;
        }

        body { 
            background: var(--primary-bg); 
            margin: 0; padding: 0; 
            font-family: var(--font-main); 
            color: var(--text-dark); 
            overflow-x: hidden; 
        }

        /* --- Login Overlay --- */
        #loginOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fff; z-index: 999999; 
            display: flex; align-items: center; justify-content: center; 
        }
        .login-box { 
            background: #fff; padding: 40px; border-radius: 30px; width: 85%; max-width: 380px; 
            text-align: center; box-shadow: 0 15px 40px rgba(10,31,255,0.1); border: 1px solid #eee;
        }
        .login-box input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #ddd; outline: none; }
        .login-box button { width: 100%; padding: 16px; background: var(--card-blue); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }

        /* --- Page: Subject Menu (ලස්සන කරන ලද බටන්) --- */
        #subjectMenu { 
            display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; 
            background: var(--card-blue); position: relative; 
        }
        #subjectMenu::before { 
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 65%; 
            background-color: var(--primary-bg); border-radius: 0 0 50% 50% / 0 0 15% 15%; 
        }
        #subjectMenu h2 {
            position: relative; z-index: 2; color: #0022ff; 
            font-weight: 700; margin-bottom: 30px; letter-spacing: 1px; font-size: 24px;
        }
        .menu-card { 
            width: 85%; max-width: 400px; padding: 22px 30px; 
            background: #ffffff; border-radius: 24px; 
            cursor: pointer; margin-bottom: 25px; position: relative; z-index: 2; 
            display: flex; align-items: center; gap: 20px; 
            color: #0022ff; font-weight: 600; font-size: 18px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); border: 2px solid transparent;
        }
        .menu-card:hover { 
            background: var(--highlight-green); color: #000; 
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 35px rgba(0,0,0,0.2); border-color: #fff;
        }
        .menu-card:active { transform: scale(0.95); }
        .menu-card i {
            font-size: 35px; background: rgba(10, 31, 255, 0.1);
            padding: 10px; border-radius: 15px;
        }
        .menu-card:hover i { background: rgba(0, 0, 0, 0.1); }

        /* --- Page: Lesson Menu --- */
        #lessonMenu { display: none; min-height: 100vh; padding: 40px 20px; flex-direction: column; align-items: center; }
        .lesson-card { 
            width: 100%; max-width: 550px; background: #fff; padding: 20px; margin-bottom: 15px; 
            border-radius: 15px; border-left: 8px solid var(--card-blue); cursor: pointer; 
            display: flex; align-items: center; justify-content: space-between; transition: 0.3s; 
        }
        .lesson-card:hover { transform: translateX(10px); border-left-color: var(--highlight-green); }

        /* --- Page: Player Content --- */
        #mainContent { display: none; padding: 20px; max-width: 900px; margin: 0 auto; }
        #videoContainer { 
            display: none; position: relative; width: 100%; background: #000; 
            border-radius: 20px; overflow: hidden; aspect-ratio: 16 / 9; 
            box-shadow: 0 15px 45px rgba(10,31,255,0.15); margin-bottom: 25px; 
        }
        #player { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .click-layer { position: absolute; top: 0; left: 0; width: 100%; height: 80%; z-index: 10; cursor: pointer; background: transparent; }

        /* Custom Video Controls */
        .custom-controls { 
            position: absolute; bottom: 0; left: 0; right: 0; 
            background: linear-gradient(transparent, rgba(0,0,0,0.95)); 
            padding: 20px 25px; display: flex; flex-direction: column; z-index: 999; transition: 0.4s; 
        }
        .custom-controls.hidden { opacity: 0; transform: translateY(15px); pointer-events: none; }

        .seek-bar-container { width: 100%; display: flex; align-items: center; margin-bottom: 20px; cursor: pointer; height: 15px; }
        .seek-bar-slider { width: 100%; height: 6px; background: rgba(255,255,255,0.3); border-radius: 4px; position: relative; }
        .seek-bar-progress { height: 100%; background: var(--highlight-green); width: 0%; border-radius: 4px; }
        .seek-bar-knob { width: 18px; height: 18px; background: #fff; border-radius: 50%; position: absolute; top: 50%; transform: translate(-50%, -50%); left: 0%; box-shadow: 0 0 10px rgba(0,0,0,0.5); }

        .time-row { display: flex; align-items: center; justify-content: space-between; color: #fff; }
        .controls-left { display: flex; align-items: center; gap: 20px; }
        
        .icon-btn .material-icons { font-size: 38px; }
        .icon-btn { background: none; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; padding: 5px; transition: 0.2s; }
        .icon-btn:hover { color: var(--highlight-green); }

        .select-style { 
            background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); 
            padding: 6px 12px; border-radius: 8px; font-size: 14px; outline: none; cursor: pointer;
        }

        /* Playlist */
        .playlist-container { background: #fff; border-radius: 20px; padding: 20px; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        .playlist-item { padding: 15px; margin-bottom: 10px; background: #f9f9f9; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.2s; border: 2px solid transparent; }
        .playlist-item.active { border-color: var(--card-blue); background: #eef3ff; color: var(--card-blue); font-weight: 600; }
        .item-index { background: var(--card-blue); color: #fff; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 13px; font-weight: bold; flex-shrink: 0; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color:var(--card-blue)">Study Portal</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="checkLogin()">ඇතුල් වන්න</button>
        </div>
    </div>

    <div id="subjectMenu" class="page-section">
        <h2>විෂය ධාරාව තෝරන්න</h2>
        <div class="menu-card" onclick="navigateTo('lessons', 'et')">
            <i class="material-icons">engineering</i> 
            <span>Engineering Tech (ET)</span>
        </div>
        <div class="menu-card" onclick="navigateTo('lessons', 'sft')">
            <i class="material-icons">science</i> 
            <span>Science for Tech (SFT)</span>
        </div>
    </div>

    <div id="lessonMenu" class="page-section">
        <h2 id="lessonMenuTitle" style="color:var(--card-blue); margin-bottom: 25px; text-align: center;">පාඩම් මාලාව</h2>
        <div id="lessonListContainer" style="width:100%"></div>
    </div>

    <div id="mainContent" class="page-section">
        <div id="videoContainer">
            <div id="player"></div>
            <div class="click-layer" onclick="handleTap()"></div>
            <div class="custom-controls" id="controlBar">
                <div class="seek-bar-container" onclick="handleSeek(event)">
                    <div class="seek-bar-slider"><div class="seek-bar-progress" id="seekBarProgress"></div><div class="seek-bar-knob" id="seekBarKnob"></div></div>
                </div>
                <div class="time-row">
                    <div class="controls-left">
                        <button class="icon-btn" onclick="togglePlay(event)"><i class="material-icons" id="playIcon">play_arrow</i></button>
                        <div style="font-size:14px; font-family:monospace;"><span id="currentTime">00:00:00</span> / <span id="duration">00:00:00</span></div>
                    </div>
                    <div style="display:flex; align-items:center; gap:15px;">
                        <select class="select-style" id="speed" onchange="setSpeed(event)">
                            <option value="0.5">0.5x</option><option value="1" selected>1.0x</option><option value="1.5">1.5x</option><option value="2.0">2.0x</option>
                        </select>
                        <button class="icon-btn" onclick="toggleFullScreen(event)"><i class="material-icons">fullscreen</i></button>
                    </div>
                </div>
            </div>
        </div>
        <div class="playlist-container">
            <h3 style="color:var(--card-blue); margin-top:0;">වීඩියෝ පටුන</h3>
            <div id="playlist"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApozqbVy4DFupEKafsU_oeC9RUAq1ljuU",
            authDomain: "tech-590c8.firebaseapp.com",
            databaseURL: "https://tech-590c8-default-rtdb.firebaseio.com",
            projectId: "tech-590c8",
            storageBucket: "tech-590c8.firebasestorage.app",
            messagingSenderId: "379663698743",
            appId: "1:379663698743:web:7fba89d9f7b231ca6828b2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allData = {}, videoData = [], player, hideTimeout;

        // Firebase Sync & Navigation Handle
        db.ref("studyData").on("value", s => { 
            allData = s.val() || {}; 
            if(localStorage.getItem("isLoggedIn") === "true") {
                if(!history.state) navigateTo('subjects', '', '', false);
                else renderPage(history.state);
            }
        });

        // NATIVE BACK BUTTON LOGIC
        window.onpopstate = (event) => {
            if (event.state) renderPage(event.state);
            else renderPage({page: 'subjects'});
        };

        function navigateTo(page, param1 = '', param2 = '', push = true) {
            const state = { page, param1, param2 };
            if(push) history.pushState(state, '', '');
            renderPage(state);
        }

        function renderPage(state) {
            if(localStorage.getItem("isLoggedIn") !== "true") return;
            document.querySelectorAll('.page-section, #loginOverlay').forEach(s => s.style.display = 'none');

            if(state.page === 'subjects') document.getElementById("subjectMenu").style.display = "flex";
            else if(state.page === 'lessons') showLessonsUI(state.param1);
            else if(state.page === 'player') startPlayerUI(state.param1, state.param2);
        }

        function showLessonsUI(stream) {
            document.getElementById("lessonMenu").style.display = "flex";
            const cont = document.getElementById("lessonListContainer");
            cont.innerHTML = "";
            if(allData[stream]) {
                Object.keys(allData[stream]).forEach(l => {
                    let div = document.createElement("div"); div.className = "lesson-card";
                    div.innerHTML = `<span>${l}</span><i class="material-icons">arrow_forward_ios</i>`;
                    div.onclick = () => navigateTo('player', stream, l);
                    cont.appendChild(div);
                });
            }
        }

        function startPlayerUI(stream, lesson) {
            const lessonData = allData[stream] && allData[stream][lesson];
            videoData = lessonData && lessonData.videos ? Object.values(lessonData.videos) : [];
            document.getElementById("mainContent").style.display = "block";
            document.getElementById("videoContainer").style.display = "none";
            renderPlaylist();
        }

        function renderPlaylist() {
            const pl = document.getElementById("playlist"); pl.innerHTML = "";
            videoData.forEach((v, i) => {
                let div = document.createElement("div"); div.className = "playlist-item"; div.id = `vid-${i}`;
                div.innerHTML = `<div class="item-index">${i+1}</div> <span>${v.title}</span>`;
                div.onclick = () => loadVideo(i); pl.appendChild(div);
            });
        }

        function loadVideo(i) {
            document.getElementById("videoContainer").style.display = "block";
            const vidId = videoData[i].id;
            if(!player) {
                let tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
                document.body.appendChild(tag);
                window.onYouTubeIframeAPIReady = () => {
                    player = new YT.Player('player', { videoId: vidId, playerVars: { 'autoplay': 1, 'controls': 0 }, events: { 'onReady': onPlayerReady, 'onStateChange': onStateChange } });
                };
            } else player.loadVideoById(vidId);
            document.querySelectorAll('.playlist-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`vid-${i}`).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function onPlayerReady() { setInterval(updateUI, 500); showControls(); }
        function onStateChange(e) { document.getElementById("playIcon").innerText = e.data === 1 ? "pause" : "play_arrow"; if(e.data === 1) resetTimer(); else showControls(); }
        function handleTap() { const cb = document.getElementById("controlBar"); cb.classList.contains("hidden") ? showControls() : hideControls(); }
        function showControls() { document.getElementById("controlBar").classList.remove("hidden"); resetTimer(); }
        function hideControls() { if(player && player.getPlayerState() === 1) document.getElementById("controlBar").classList.add("hidden"); }
        function resetTimer() { clearTimeout(hideTimeout); if(player && player.getPlayerState() === 1) hideTimeout = setTimeout(hideControls, 4000); }
        function togglePlay(e) { e.stopPropagation(); if(player.getPlayerState() === 1) player.pauseVideo(); else player.playVideo(); }
        function setSpeed(e) { e.stopPropagation(); player.setPlaybackRate(parseFloat(e.target.value)); }
        function toggleFullScreen(e) { e.stopPropagation(); var container = document.getElementById("videoContainer"); if(!document.fullscreenElement) container.requestFullscreen(); else document.exitFullscreen(); }
        function handleSeek(e) { e.stopPropagation(); var rect = e.currentTarget.getBoundingClientRect(); player.seekTo(player.getDuration() * ((e.clientX - rect.left) / rect.width), true); }
        function updateUI() { if(player && player.getCurrentTime) { let curr = player.getCurrentTime(), dur = player.getDuration(); document.getElementById("currentTime").innerText = formatTime(curr); document.getElementById("duration").innerText = formatTime(dur); if(dur > 0) { let p = (curr / dur) * 100; document.getElementById("seekBarProgress").style.width = p + "%"; document.getElementById("seekBarKnob").style.left = p + "%"; } } }
        function formatTime(t) { t = Math.round(t); var h = Math.floor(t / 3600); var m = Math.floor((t % 3600) / 60); var s = t % 60; return (h < 10 ? "0" + h : h) + ":" + (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s); }
        function checkLogin() { if(document.getElementById("username").value === "Ulindu" && document.getElementById("password").value === "2007") { localStorage.setItem("isLoggedIn", "true"); navigateTo('subjects'); } }
    </script>
</body>
</html>
