<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Study Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --primary: #1a73e8; --bg: #f0f2f5; --yt-red: #ff0000; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 0; user-select: none; -webkit-touch-callout: none; }
        
        .screen { display: none; padding: 15px; animation: fadeIn 0.4s; box-sizing: border-box; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        header { background: var(--primary); color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card { background: white; padding: 18px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 12px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; border: 1px solid #eee; }

        /* --- Compact Player Styles --- */
        #playerSection { display: none; margin-top: 10px; animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .video-box { 
            position: relative; width: 100%; max-width: 854px; margin: 0 auto; 
            background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16 / 9; 
            z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        #player { width: 100%; height: 100%; position: absolute; top: 0; left: 0; pointer-events: none; }
        .click-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; cursor: pointer; background: transparent; }
        
        .custom-controls { 
            position: absolute; bottom: 0; left: 0; right: 0; 
            background: linear-gradient(transparent, rgba(0,0,0,0.95)); 
            display: flex; flex-direction: column; padding: 15px 20px; 
            transition: 0.4s; z-index: 99999 !important; 
        }
        .custom-controls.hidden { opacity: 0; transform: translateY(20px); pointer-events: none; }
        
        .seek-bar-container { width: 100%; display: flex; align-items: center; margin-bottom: 12px; cursor: pointer; position: relative; height: 10px; }
        .seek-bar-slider { width: 100%; height: 4px; background: rgba(255,255,255,0.25); border-radius: 2px; position: relative; }
        .seek-bar-progress { height: 100%; background: var(--yt-red); width: 0%; border-radius: 2px; }
        .seek-bar-knob { width: 14px; height: 14px; background: var(--yt-red); border-radius: 50%; position: absolute; top: 50%; transform: translate(-50%, -50%); left: 0%; }
        
        .time-row { display: flex; align-items: center; justify-content: space-between; }
        .controls-left { display: flex; align-items: center; gap: 15px; }
        .time-display { font-size: 13px; color: #fff; font-weight: 500; }
        
        .icon-btn { background: none; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; padding: 5px; }
        .icon-btn i { font-size: 28px; }
        .select-style { background: rgba(255,255,255,0.1); color: white; border: 1px solid #444; padding: 4px 8px; border-radius: 6px; font-size: 12px; outline: none; }

        .auth-box { max-width: 360px; margin: 40px auto; padding: 25px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button.login-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div id="masterAuthScreen" class="screen">
    <div class="auth-box">
        <i class="material-icons" style="font-size: 50px; color: var(--primary);">lock</i>
        <h2>App Authentication</h2>
        <input type="text" id="mUser" placeholder="Username">
        <input type="password" id="mPass" placeholder="Password">
        <button class="login-btn" onclick="masterAuth()">ඇතුල් වන්න</button>
    </div>
</div>

<div id="loginScreen" class="screen">
    <header><h1>Student Login</h1></header>
    <div style="max-width: 360px; margin: auto;">
        <input type="text" id="loginName" placeholder="නම">
        <input type="password" id="loginPass" placeholder="මුරපදය">
        <button class="login-btn" onclick="login()">Log In</button>
    </div>
</div>

<div id="mainMenuScreen" class="screen">
    <header><h2 id="welcomeMsg">ආයුබෝවන්</h2></header>
    <div id="subjectList"></div>
</div>

<div id="topicsScreen" class="screen">
    <header style="display:flex; justify-content:space-between; align-items:center;">
        <i class="material-icons" onclick="showScreen('mainMenuScreen')" style="cursor:pointer;">arrow_back</i>
        <span id="subTitle" style="font-weight:600;">පාඩම්</span>
        <div style="width:24px;"></div>
    </header>
    <div id="topicsList"></div>
</div>

<div id="playerScreen" class="screen">
    <div id="videoListContainer">
        <header style="background:none; color:#333; box-shadow:none; display:flex; align-items:center; padding:10px 0;">
            <i class="material-icons" onclick="showScreen('topicsScreen')" style="cursor:pointer; margin-right:15px;">arrow_back</i>
            <span id="lessonTitle" style="font-size:18px; font-weight:600;">වීඩියෝ තෝරන්න</span>
        </header>
        <div id="multiVideoList"></div>
    </div>

    <div id="playerSection">
        <header style="background:none; color:#333; box-shadow:none; display:flex; align-items:center; padding:10px 0;">
            <i class="material-icons" onclick="hidePlayer()" style="cursor:pointer; margin-right:15px;">arrow_back</i>
            <span id="activeVideoTitle" style="font-size:16px; font-weight:600;">වීඩියෝව ප්ලේ වේ...</span>
        </header>
        <div class="video-box" id="videoContainer">
            <div id="player"></div>
            <div class="click-layer" onclick="handleTap()"></div>
            <div class="custom-controls" id="controlBar">
                <div class="seek-bar-container" onclick="handleSeek(event)">
                    <div class="seek-bar-slider"><div class="seek-bar-progress" id="seekBarProgress"></div><div class="seek-bar-knob" id="seekBarKnob"></div></div>
                </div>
                <div class="time-row">
                    <div class="controls-left">
                        <button class="icon-btn" onclick="togglePlay(event)" id="playPauseBtn"><i class="material-icons">play_arrow</i></button>
                        <div class="time-display"><span id="currentTime">0:00</span> / <span id="duration">0:00</span></div>
                    </div>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <select class="select-style" id="speed" onchange="setSpeed(event)"><option value="0.5">0.5x</option><option value="1" selected>1.0x</option><option value="1.5">1.5x</option><option value="2">2.0x</option></select>
                        <button class="icon-btn" onclick="toggleFullScreen(event)"><i class="material-icons">fullscreen</i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyApozqbVy4DFupEKafsU_oeC9RUAq1ljuU",
        authDomain: "tech-590c8.firebaseapp.com",
        databaseURL: "https://tech-590c8-default-rtdb.firebaseio.com",
        projectId: "tech-590c8",
        storageBucket: "tech-590c8.firebasestorage.app",
        messagingSenderId: "379663698743",
        appId: "1:379663698743:web:7fba89d9f7b231ca6828b2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let player, hideTimeout;
    let currentVideos = [];

    // --- පද්ධතිය ආරම්භයේදී පරීක්ෂා කිරීම ---
    window.onload = () => {
        const isVerified = localStorage.getItem('isAppVerified');
        const savedUser = localStorage.getItem('studyUser');

        if (!isVerified) {
            showScreen('masterAuthScreen');
        } else if (!savedUser) {
            showScreen('loginScreen');
        } else {
            currentUser = JSON.parse(savedUser);
            checkUserStatus(currentUser.id); // ශිෂ්‍යයා තවමත් සිටීදැයි DB එකෙන් බලයි
        }
    };

    function checkUserStatus(userId) {
        db.ref(`students/${userId}`).once('value', snap => {
            if (snap.exists()) {
                loadDashboard();
            } else {
                // ඇඩ්මින් විසින් Delete කර ඇත්නම් දත්ත මකා Login එක පෙන්වයි
                localStorage.removeItem('studyUser');
                currentUser = null;
                alert("ඔබගේ ගිණුම අවලංගු කර ඇත.");
                showScreen('loginScreen');
            }
        }).catch(() => loadDashboard()); // Internet නැත්නම් Dashboard එක පෙන්වයි
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function masterAuth() {
        if (document.getElementById("mUser").value === "ulindu" && document.getElementById("mPass").value === "2007") {
            localStorage.setItem('isAppVerified', 'true');
            showScreen('loginScreen');
        } else alert("වැරදියි!");
    }

    function login() {
        const u = document.getElementById("loginName").value.trim();
        const p = document.getElementById("loginPass").value.trim();
        db.ref('students').once('value', snap => {
            const data = snap.val();
            for(let key in data) {
                if(data[key].name === u && data[key].password === p) {
                    currentUser = {id: key, ...data[key]};
                    localStorage.setItem('studyUser', JSON.stringify(currentUser));
                    loadDashboard(); return;
                }
            }
            alert("ලොගින් අසාර්ථකයි!");
        });
    }

    function loadDashboard() {
        document.getElementById("welcomeMsg").innerText = "ආයුබෝවන්, " + currentUser.name;
        showScreen('mainMenuScreen');
        const list = document.getElementById("subjectList");
        db.ref(`students/${currentUser.id}/access`).on('value', s => {
            const acc = s.val(); list.innerHTML = "";
            if(acc === 'et' || acc === 'both') list.innerHTML += `<div class="card" onclick="openStream('et')">Engineering Tech (ET) <i class="material-icons">chevron_right</i></div>`;
            if(acc === 'sft' || acc === 'both') list.innerHTML += `<div class="card" onclick="openStream('sft')">Science for Tech (SFT) <i class="material-icons">chevron_right</i></div>`;
        });
    }

    function openStream(type) {
        document.getElementById("subTitle").innerText = type.toUpperCase() + " Lessons";
        showScreen('topicsScreen');
        db.ref(`students/${currentUser.id}/allowedLessons/${type}`).on('value', s => {
            const allowed = s.val() || {};
            db.ref(`studyData/${type}`).once('value', ds => {
                const lessons = ds.val();
                const container = document.getElementById("topicsList");
                container.innerHTML = "";
                for(let name in lessons) {
                    if(allowed[name]) {
                        const d = document.createElement("div"); d.className = "card";
                        d.onclick = () => showVideoList(name, lessons[name].videos);
                        d.innerHTML = `<span>${name}</span> <i class="material-icons">chevron_right</i>`;
                        container.appendChild(d);
                    }
                }
            });
        });
    }

    function showVideoList(title, videos) {
        document.getElementById("lessonTitle").innerText = title;
        currentVideos = Object.values(videos);
        showScreen('playerScreen');
        document.getElementById("videoListContainer").style.display = "block";
        document.getElementById("playerSection").style.display = "none";
        const listContainer = document.getElementById("multiVideoList");
        listContainer.innerHTML = "";
        currentVideos.forEach((v, index) => {
            const d = document.createElement("div"); d.className = "card";
            d.onclick = () => playThisVideo(index);
            d.innerHTML = `<span>${v.title}</span> <i class="material-icons">play_circle_outline</i>`;
            listContainer.appendChild(d);
        });
    }

    function playThisVideo(index) {
        const vid = currentVideos[index];
        document.getElementById("activeVideoTitle").innerText = vid.title;
        document.getElementById("videoListContainer").style.display = "none";
        document.getElementById("playerSection").style.display = "block";
        if (!player) {
            player = new YT.Player('player', {
                videoId: vid.id,
                playerVars: { 'autoplay': 1, 'controls': 0, 'modestbranding': 1, 'rel': 0, 'playsinline': 1 },
                events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange }
            });
        } else { player.loadVideoById(vid.id); }
    }

    function hidePlayer() { if(player) player.pauseVideo(); document.getElementById("playerSection").style.display = "none"; document.getElementById("videoListContainer").style.display = "block"; }
    function onPlayerReady() { setInterval(updateUI, 500); }
    function onPlayerStateChange(e) {
        const btn = document.getElementById("playPauseBtn");
        if (e.data === YT.PlayerState.PLAYING) { btn.innerHTML = '<i class="material-icons">pause</i>'; resetTimer(); }
        else { btn.innerHTML = '<i class="material-icons">play_arrow</i>'; showControls(); }
    }

    function handleTap() { const cb = document.getElementById("controlBar"); cb.classList.contains("hidden") ? showControls() : hideControls(); }
    function showControls() { document.getElementById("controlBar").classList.remove("hidden"); resetTimer(); }
    function hideControls() { if (player && player.getPlayerState() === 1) document.getElementById("controlBar").classList.add("hidden"); }
    function resetTimer() { clearTimeout(hideTimeout); if (player && player.getPlayerState() === 1) hideTimeout = setTimeout(hideControls, 4000); }
    function togglePlay(e) { e.stopPropagation(); if(player) (player.getPlayerState() === 1) ? player.pauseVideo() : player.playVideo(); }
    function setSpeed(e) { e.stopPropagation(); if(player) player.setPlaybackRate(parseFloat(e.target.value)); }
    function toggleFullScreen(e) { e.stopPropagation(); var container = document.getElementById("videoContainer"); if (!document.fullscreenElement) container.requestFullscreen(); else document.exitFullscreen(); }
    function handleSeek(e) { e.stopPropagation(); if(player) { var rect = e.currentTarget.getBoundingClientRect(); var pos = (e.clientX - rect.left) / rect.width; player.seekTo(player.getDuration() * pos, true); } }
    function updateUI() { if (player && player.getCurrentTime) { var curr = player.getCurrentTime(), dur = player.getDuration(); document.getElementById("currentTime").innerText = formatTime(curr); document.getElementById("duration").innerText = formatTime(dur); if (dur > 0) { var p = (curr / dur) * 100; document.getElementById("seekBarProgress").style.width = p + "%"; document.getElementById("seekBarKnob").style.left = p + "%"; } } }
    function formatTime(t) { t = Math.round(t); var m = Math.floor(t / 60), s = t % 60; return m + ":" + (s < 10 ? "0" : "") + s; }
</script>
</body>
</html>
