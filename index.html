<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Learning Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background: #000; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; color: white; overflow-x: hidden; }
        .material-Icons { font-family: 'Material Icons'; font-size: 32px; display: inline-block; line-height: 1; }

        /* Login Overlay */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0b0b; z-index: 999999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #111; padding: 30px; border-radius: 15px; width: 85%; max-width: 350px; text-align: center; border: 1px solid #222; }
        .login-box input { width: 100%; padding: 14px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        .login-box button { width: 100%; padding: 14px; background: #ff0000; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Home Menu */
        #homeMenu { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .menu-card { 
            width: 85%; max-width: 400px; padding: 25px; text-align: center; 
            background: #111; border: 2px solid #ff0000; border-radius: 15px; 
            cursor: pointer; font-size: 22px; font-weight: bold; transition: 0.3s;
        }
        .menu-card:hover { background: #ff0000; transform: scale(1.02); }

        /* Player Section */
        #playerSection { display: none; padding: 10px; }
        .back-btn { 
            max-width: 854px; margin: 0 auto 15px; display: flex; align-items: center; 
            color: #ccc; cursor: pointer; background: none; border: none; padding: 0; gap: 5px;
        }

        .video-box { 
            position: relative; max-width: 854px; margin: 0 auto; background: #000; 
            border-radius: 12px; overflow: hidden; aspect-ratio: 16 / 9; z-index: 10;
        }
        #player { width: 100%; height: 100%; position: absolute; top: 0; left: 0; pointer-events: none; }
        .click-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; cursor: pointer; background: transparent; }

        .custom-controls { 
            position: absolute; bottom: 0; left: 0; right: 0; 
            background: linear-gradient(transparent, rgba(0,0,0,0.95)); 
            display: flex; flex-direction: column; padding: 20px 25px; transition: 0.4s; z-index: 99999 !important;
        }
        .custom-controls.hidden { opacity: 0; transform: translateY(30px); pointer-events: none; }

        .seek-bar-container { width: 100%; display: flex; align-items: center; margin-bottom: 15px; cursor: pointer; position: relative; height: 12px; }
        .seek-bar-slider { width: 100%; height: 6px; background: rgba(255,255,255,0.25); border-radius: 3px; position: relative; }
        .seek-bar-progress { height: 100%; background: #ff0000; width: 0%; border-radius: 3px; }
        .seek-bar-knob { width: 18px; height: 18px; background: #ff0000; border-radius: 50%; position: absolute; top: 50%; transform: translate(-50%, -50%); left: 0%; }

        .time-row { display: flex; align-items: center; justify-content: space-between; }
        .controls-left { display: flex; align-items: center; gap: 20px; }
        .time-display { font-size: 15px; color: #fff; }
        .now-playing { font-size: 14px; color: #ccc; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .icon-btn { background: none; border: none; color: #fff; cursor: pointer; padding: 5px; }

        .playlist-container { max-width: 854px; margin: 20px auto; background: #111; border-radius: 12px; padding: 15px; border: 1px solid #222; }
        .playlist-item { display: flex; align-items: center; padding: 16px; margin-bottom: 8px; background: #1a1a1a; border-radius: 10px; cursor: pointer; border: 1px solid transparent; }
        .playlist-item.active { border-color: #ff0000; background: rgba(255, 0, 0, 0.05); }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color:#ff0000">Bio & Stats Login</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="checkLogin()">ඇතුල් වන්න</button>
            <p id="error" style="color:red; display:none; margin-top:10px;">විස්තර වැරදියි!</p>
        </div>
    </div>

    <div id="homeMenu">
        <h2 style="margin-bottom: 30px;">පාඩම් මාලාව තෝරන්න</h2>
        <div class="menu-card" onclick="openSubject('bio')">ජෛව රසායනය</div>
        <div class="menu-card" onclick="openSubject('stats')">සංඛ්‍යානය</div>
        <p onclick="logout()" style="color: #555; cursor: pointer; margin-top: 20px;">Logout</p>
    </div>

    <div id="playerSection">
        <button class="back-btn" onclick="goBack()"><i class="material-icons">arrow_back</i> මුල් පිටුවට</button>
        <div class="video-box" id="videoContainer">
            <div id="player"></div>
            <div class="click-layer" onclick="handleTap()"></div>
            <div class="custom-controls" id="controlBar">
                <div class="seek-bar-container" onclick="handleSeek(event)">
                    <div class="seek-bar-slider">
                        <div class="seek-bar-progress" id="seekBarProgress"></div>
                        <div class="seek-bar-knob" id="seekBarKnob"></div>
                    </div>
                </div>
                <div class="time-row">
                    <div class="controls-left">
                        <button class="icon-btn" onclick="togglePlay(event)" id="playPauseBtn"><i class="material-Icons">play_arrow</i></button>
                        <div class="time-display"><span id="currentTime">0:00</span> / <span id="duration">0:00</span></div>
                        <div class="now-playing" id="nowPlaying">Loading...</div>
                    </div>
                    <button class="icon-btn" onclick="toggleFullScreen()"><i class="material-Icons">fullscreen</i></button>
                </div>
            </div>
        </div>
        <div class="playlist-container" id="playlist"></div>
    </div>

<script>
    const VALID_USER = "Ulindu kawishka";
    const VALID_PASS = "200704938Uk";

    const subjects = {
        bio: [
            { id: "lMR_RtHbGcw", title: "ජෛව රසායනය ( Day 01 )" }, { id: "SOi5karTuQU", title: "Day 02 [Part 01]" }, { id: "2iCOyz9fWME", title: "Day 02 [Part 02]" }, 
            { id: "IcMmdsa3yw8", title: "ජෛව රසායනය - Day 03" }, { id: "pp49TELoPs0", title: "ජෛව රසායනය - Day 04" }, { id: "AdfjiYBNDTw", title: "Day 04 [Part 2]" }, 
            { id: "XH3uO16T7A0", title: "ජෛව රසායනය - Day 05" }, { id: "hpdxRUjHJhU", title: "Day 05 [Part 2]" }, { id: "G36isU4cPhU", title: "ජෛව රසායනය - Day 06" }, 
            { id: "ilScRAwcJmI", title: "Day 07 [Part 1]" }, { id: "9wKjkB0OUCA", title: "Day 07 [Part 2]" }
        ],
        stats: [
            { id: "Gs2c3SgYk2o", title: "සංඛ්‍යානය - Day 01" }, { id: "s1WtwxKA8hQ", title: "සංඛ්‍යානය - Day 02" },
            { id: "RL-MjG739qE", title: "සංඛ්‍යානය - Day 02 {Part 02}" }, { id: "AyFdasZua54", title: "සංඛ්‍යානය - Day 03" },
            { id: "tvye27rdKQM", title: "සංඛ්‍යානය - Day 03 {Part 02}" }, { id: "1tMScxVcZOE", title: "සංඛ්‍යානය - Day 04" },
            { id: "MDZ_JjdjijM", title: "සංඛ්‍යානය - Day 05" }, { id: "41lefx60PXk", title: "සංඛ්‍යානය - Day 05 {Part 02}" },
            { id: "B_g_AnkOxQ8", title: "සංඛ්‍යානය - Day 06" }
        ]
    };

    let currentSubject = '';
    let player, hideTimeout;

    // --- වැදගත්ම කොටස: Auto Login Check ---
    window.onload = function() {
        if (localStorage.getItem("isLoggedIn") === "true") {
            showHome();
        }
    };

    function checkLogin() { 
        const u = document.getElementById("username").value;
        const p = document.getElementById("password").value;
        if (u === VALID_USER && p === VALID_PASS) { 
            localStorage.setItem("isLoggedIn", "true"); // ලොගින් එක සදාකාලිකව මතක තබා ගනී
            showHome();
        } else { 
            document.getElementById("error").style.display = "block"; 
        } 
    }

    function logout() {
        localStorage.removeItem("isLoggedIn");
        location.reload();
    }

    function showHome() {
        document.getElementById("loginOverlay").style.display = "none"; 
        document.getElementById("homeMenu").style.display = "flex"; 
        loadYouTubeAPI();
    }

    // --- ප්ලේයර් සහ මෙනු හසුරුවන කොටස් ---
    function openSubject(type) {
        currentSubject = type;
        document.getElementById("homeMenu").style.display = "none";
        document.getElementById("playerSection").style.display = "block";
        renderPlaylist();
        loadVideo(0);
    }

    function goBack() {
        if(player) player.pauseVideo();
        document.getElementById("playerSection").style.display = "none";
        document.getElementById("homeMenu").style.display = "flex";
    }

    function loadYouTubeAPI() { 
        if (window.YT) return; // දැනටමත් Load වී ඇත්නම් නැවත අවශ්‍ය නැත
        var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api"; 
        var firstScriptTag = document.getElementsByTagName('script')[0]; firstScriptTag.parentNode.insertBefore(tag, firstScriptTag); 
    }

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '480', width: '854', videoId: subjects.bio[0].id,
            playerVars: { 'autoplay': 0, 'controls': 0, 'modestbranding': 1, 'enablejsapi': 1, 'rel': 0, 'playsinline': 1 },
            events: { 'onReady': () => setInterval(updateUI, 500), 'onStateChange': onPlayerStateChange }
        });
    }

    function renderPlaylist() {
        const listDiv = document.getElementById("playlist");
        listDiv.innerHTML = `<h3 style="color:#ff0000; border-bottom:1px solid #333; padding-bottom:10px;">පාඩම් ලැයිස්තුව</h3>`;
        subjects[currentSubject].forEach((vid, index) => {
            const item = document.createElement("div");
            item.className = "playlist-item";
            item.onclick = () => loadVideo(index);
            item.innerHTML = `<span style="font-weight:bold; margin-right:15px; color:#666;">${index+1}</span><span>${vid.title}</span>`;
            listDiv.appendChild(item);
        });
    }

    function loadVideo(index) {
        const video = subjects[currentSubject][index];
        player.loadVideoById(video.id);
        document.getElementById("nowPlaying").innerText = video.title;
        document.querySelectorAll(".playlist-item").forEach((el, i) => el.classList.toggle("active", i === index));
    }

    function onPlayerStateChange(e) {
        const btn = document.getElementById("playPauseBtn");
        btn.innerHTML = (e.data === YT.PlayerState.PLAYING) ? '<i class="material-Icons">pause</i>' : '<i class="material-Icons">play_arrow</i>';
        if (e.data === YT.PlayerState.PLAYING) resetTimer(); else showControls();
    }

    function handleTap() {
        const cb = document.getElementById("controlBar");
        cb.classList.contains("hidden") ? showControls() : hideControls();
    }

    function showControls() { document.getElementById("controlBar").classList.remove("hidden"); resetTimer(); }
    function hideControls() { if (player.getPlayerState() === 1) document.getElementById("controlBar").classList.add("hidden"); }
    function resetTimer() { clearTimeout(hideTimeout); if (player.getPlayerState() === 1) hideTimeout = setTimeout(hideControls, 4000); }

    function togglePlay(e) { e.stopPropagation(); (player.getPlayerState() === 1) ? player.pauseVideo() : player.playVideo(); }

    function handleSeek(e) {
        var rect = document.getElementById("seekBarContainer").getBoundingClientRect();
        player.seekTo(player.getDuration() * ((e.clientX - rect.left) / rect.width), true);
    }

    function updateUI() {
        if (player && player.getCurrentTime) {
            var curr = player.getCurrentTime(), dur = player.getDuration();
            document.getElementById("currentTime").innerText = formatTime(curr);
            document.getElementById("duration").innerText = formatTime(dur);
            if (dur > 0) {
                var p = (curr / dur) * 100;
                document.getElementById("seekBarProgress").style.width = p + "%";
                document.getElementById("seekBarKnob").style.left = p + "%";
            }
        }
    }
    function formatTime(t) { t = Math.round(t); var m = Math.floor(t / 60), s = t % 60; return m + ":" + (s < 10 ? "0" : "") + s; }
    function toggleFullScreen() { var v = document.getElementById("videoContainer"); if (!document.fullscreenElement) v.requestFullscreen(); else document.exitFullscreen(); }
</script>
</body>
</html>
