<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Study Portal | Smart Learner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { 
            --primary: #4361ee; 
            --primary-light: #4895ef;
            --success: #4cc9f0;
            --bg: #f8f9fc; 
            --yt-red: #ff0000; 
            --glass: rgba(255, 255, 255, 0.9);
            --shadow: 0 10px 25px rgba(0,0,0,0.08);
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 0; 
            user-select: none; 
            -webkit-touch-callout: none; 
            color: #2b2d42;
        }
        
        .screen { display: none; padding: 20px; animation: slideUp 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); box-sizing: border-box; min-height: 100vh; }
        .active { display: block; }
        
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        header { 
            background: linear-gradient(135deg, var(--primary), var(--primary-light)); 
            color: white; 
            padding: 35px 20px; 
            text-align: center; 
            border-radius: 0 0 35px 35px; 
            margin-bottom: 25px; 
            box-shadow: 0 8px 20px rgba(67, 97, 238, 0.2); 
        }

        header h2 { margin: 0; font-weight: 700; font-size: 24px; }

        .card { 
            background: var(--glass); 
            padding: 22px; 
            border-radius: 18px; 
            box-shadow: var(--shadow); 
            margin-bottom: 15px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border: 1px solid rgba(255,255,255,0.7);
            transition: 0.3s;
        }
        .card:active { transform: scale(0.97); background: #fff; }

        .subject-card { 
            background: white; border-radius: 20px; overflow: hidden;
            box-shadow: var(--shadow); margin-bottom: 20px; cursor: pointer;
            transition: 0.3s; border: 1px solid #eee; display: flex; flex-direction: column;
        }
        .subject-card:active { transform: scale(0.98); }
        .banner-box { width: 100%; height: 160px; background: #eef2ff; overflow: hidden; }
        .banner-box img { width: 100%; height: 100%; object-fit: cover; }
        .info-box { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .info-box h3 { margin: 0; font-size: 17px; color: var(--primary); font-weight: 700; }

        .auth-container { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 80vh; }
        .auth-box { width: 100%; max-width: 400px; padding: 40px 30px; background: white; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 18px; margin-bottom: 20px; border: 2px solid #f1f3f9; border-radius: 15px; box-sizing: border-box; font-size: 16px; background: #f8f9fc; }
        button.login-btn { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: 700; font-size: 18px; cursor: pointer; }

        .back-nav { display: flex; align-items: center; gap: 15px; padding: 10px 5px; margin-bottom: 15px; cursor: pointer; }

        #playerSection { display: none; margin-top: 10px; }
        .video-box { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 20px; overflow: hidden; }
        #player { width: 100%; height: 100%; position: absolute; top: 0; left: 0; pointer-events: none; }
        .click-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; cursor: pointer; }
        .custom-controls { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.95)); display: flex; flex-direction: column; padding: 15px 20px; transition: 0.4s; z-index: 99999 !important; }
        .custom-controls.hidden { opacity: 0; transform: translateY(20px); pointer-events: none; }
        .seek-bar-container { width: 100%; height: 10px; display: flex; align-items: center; margin-bottom: 12px; cursor: pointer; }
        .seek-bar-slider { width: 100%; height: 4px; background: rgba(255,255,255,0.25); border-radius: 2px; position: relative; }
        .seek-bar-progress { height: 100%; background: var(--yt-red); width: 0%; border-radius: 2px; }
        .seek-bar-knob { width: 14px; height: 14px; background: var(--yt-red); border-radius: 50%; position: absolute; top: 50%; transform: translate(-50%, -50%); left: 0%; }
        .time-row { display: flex; align-items: center; justify-content: space-between; }
        .controls-left { display: flex; align-items: center; gap: 12px; }
        .time-display { font-size: 12px; color: #fff; }
        .icon-btn { background: none; border: none; color: #fff; cursor: pointer; padding: 5px; display: flex; align-items: center; }
        .speed-text { color: white; font-size: 12px; font-weight: bold; margin-left: 2px; }
    </style>
</head>
<body>

<div id="masterAuthScreen" class="screen">
    <div class="auth-container"><div class="auth-box"><h2>App Verification</h2><input type="text" id="mUser" placeholder="Username"><input type="password" id="mPass" placeholder="Password"><button class="login-btn" onclick="masterAuth()">තහවුරු කරන්න</button></div></div>
</div>

<div id="loginScreen" class="screen">
    <div class="auth-container"><div class="auth-box"><h2>Student Login</h2><input type="text" id="loginName" placeholder="ඔබේ නම"><input type="password" id="loginPass" placeholder="මුරපදය"><button class="login-btn" onclick="login()">ඇතුල් වන්න</button></div></div>
</div>

<div id="mainMenuScreen" class="screen">
    <header><h2 id="welcomeMsg">ආයුබෝවන්</h2></header>
    <div id="subjectList" style="padding: 10px 0;"></div>
</div>

<div id="topicsScreen" class="screen">
    <div class="back-nav" onclick="showScreen('mainMenuScreen')"><i class="material-icons">arrow_back</i><span id="subTitle" style="font-weight:700;">පාඩම් මාලාව</span></div>
    <div id="topicsList"></div>
</div>

<div id="playerScreen" class="screen">
    <div id="videoListContainer">
        <div class="back-nav" onclick="showScreen('topicsScreen')"><i class="material-icons">arrow_back</i><span id="lessonTitle" style="font-weight:700;">වීඩියෝ</span></div>
        <div id="multiVideoList"></div>
    </div>
    <div id="playerSection">
        <div class="back-nav" onclick="hidePlayer()"><i class="material-icons">arrow_back</i><span id="activeVideoTitle" style="font-weight:700;">ප්ලේ වේ...</span></div>
        <div class="video-box" id="videoContainer">
            <div id="player"></div><div class="click-layer" onclick="handleTap()"></div>
            <div class="custom-controls" id="controlBar">
                <div class="seek-bar-container" onclick="handleSeek(event)"><div class="seek-bar-slider"><div class="seek-bar-progress" id="seekBarProgress"></div><div class="seek-bar-knob" id="seekBarKnob"></div></div></div>
                <div class="time-row">
                    <div class="controls-left">
                        <button class="icon-btn" onclick="togglePlay(event)" id="playPauseBtn"><i class="material-icons">play_arrow</i></button>
                        <div class="time-display"><span id="currentTime">0:00</span> / <span id="duration">0:00</span></div>
                        <button class="icon-btn" onclick="changeSpeed(event)" style="margin-left: 10px;">
                            <i class="material-icons" style="font-size: 20px;">speed</i>
                            <span id="speedDisplay" class="speed-text">1x</span>
                        </button>
                    </div>
                    <button class="icon-btn" onclick="toggleFullScreen(event)"><i class="material-icons">fullscreen</i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyApozqbVy4DFupEKafsU_oeC9RUAq1ljuU",
        authDomain: "tech-590c8.firebaseapp.com",
        databaseURL: "https://tech-590c8-default-rtdb.firebaseio.com",
        projectId: "tech-590c8",
        storageBucket: "tech-590c8.firebasestorage.app",
        messagingSenderId: "379663698743",
        appId: "1:379663698743:web:7fba89d9f7b231ca6828b2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let player, hideTimeout;
    let currentVideos = [];
    let currentSpeedIndex = 1;
    const speeds = [0.5, 1, 1.25, 1.5, 2];

    window.onload = () => {
        const isVerified = localStorage.getItem('isAppVerified');
        const savedUser = localStorage.getItem('studyUser');
        if (!isVerified) showScreen('masterAuthScreen');
        else if (!savedUser) showScreen('loginScreen');
        else { currentUser = JSON.parse(savedUser); loadDashboard(); }
    };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function masterAuth() {
        if (document.getElementById("mUser").value === "ulindu" && document.getElementById("mPass").value === "2007") {
            localStorage.setItem('isAppVerified', 'true');
            showScreen('loginScreen');
        } else alert("වැරදියි!");
    }

    function login() {
        const u = document.getElementById("loginName").value.trim();
        const p = document.getElementById("loginPass").value.trim();
        db.ref('students').once('value', snap => {
            const data = snap.val();
            for(let key in data) {
                if(data[key].name === u && data[key].password === p) {
                    currentUser = {id: key, ...data[key]};
                    localStorage.setItem('studyUser', JSON.stringify(currentUser));
                    loadDashboard(); return;
                }
            }
            alert("නම හෝ මුරපදය වැරදියි!");
        });
    }

    function loadDashboard() {
        document.getElementById("welcomeMsg").innerText = "ආයුබෝවන්, " + currentUser.name;
        showScreen('mainMenuScreen');
        const list = document.getElementById("subjectList");
        
        db.ref(`students/${currentUser.id}/access`).on('value', s => {
            const acc = s.val(); list.innerHTML = "";
            
            const subData = [
                {id: 'et', name: 'Engineering Technology', img: 'et.jpeg', tag: ['et', 'both', 'all']},
                {id: 'sft', name: 'Science for Technology', img: 'sft.jpeg', tag: ['sft', 'both', 'all']},
                {id: 'ict', name: 'Information Technology', img: 'ict.jpeg', tag: ['ict', 'all']}
            ];

            subData.forEach(sub => {
                if(sub.tag.includes(acc)) {
                    list.innerHTML += `
                        <div class="subject-card" onclick="openStream('${sub.id}')">
                            <div class="banner-box"><img src="${sub.img}" onerror="this.src='https://via.placeholder.com/400x160?text=${sub.name}'"></div>
                            <div class="info-box">
                                <h3>${sub.name}</h3>
                                <i class="material-icons" style="color:#ddd">arrow_forward_ios</i>
                            </div>
                        </div>`;
                }
            });
        });
    }

    function openStream(type) {
        document.getElementById("subTitle").innerText = type.toUpperCase() + " Lessons";
        showScreen('topicsScreen');
        db.ref(`students/${currentUser.id}/allowedLessons/${type}`).on('value', s => {
            const allowed = s.val() || {};
            db.ref(`studyData/${type}`).once('value', ds => {
                const lessons = ds.val();
                const container = document.getElementById("topicsList");
                container.innerHTML = "";
                for(let name in lessons) {
                    if(allowed[name]) {
                        container.innerHTML += `<div class="card" onclick="showVideoList('${name}', ${JSON.stringify(lessons[name].videos).replace(/"/g, '&quot;')})"><span>${name}</span> <i class="material-icons">play_arrow</i></div>`;
                    }
                }
            });
        });
    }

    function showVideoList(title, videos) {
        document.getElementById("lessonTitle").innerText = title;
        currentVideos = Object.values(videos);
        showScreen('playerScreen');
        document.getElementById("videoListContainer").style.display = "block";
        document.getElementById("playerSection").style.display = "none";
        const list = document.getElementById("multiVideoList");
        list.innerHTML = "";
        currentVideos.forEach((v, index) => {
            list.innerHTML += `<div class="card" onclick="playThisVideo(${index})"><span>${v.title}</span> <i class="material-icons">video_library</i></div>`;
        });
    }

    function playThisVideo(index) {
        const vid = currentVideos[index];
        document.getElementById("activeVideoTitle").innerText = vid.title;
        document.getElementById("videoListContainer").style.display = "none";
        document.getElementById("playerSection").style.display = "block";
        if (!player) {
            player = new YT.Player('player', { videoId: vid.id, playerVars: { 'autoplay': 1, 'controls': 0, 'modestbranding': 1, 'rel': 0, 'playsinline': 1 }, events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange } });
        } else { player.loadVideoById(vid.id); }
        currentSpeedIndex = 1;
        document.getElementById("speedDisplay").innerText = "1x";
    }

    function hidePlayer() { if(player) player.pauseVideo(); document.getElementById("playerSection").style.display = "none"; document.getElementById("videoListContainer").style.display = "block"; }
    function onPlayerReady() { setInterval(updateUI, 500); }
    function onPlayerStateChange(e) {
        const btn = document.getElementById("playPauseBtn");
        if (e.data === YT.PlayerState.PLAYING) { btn.innerHTML = '<i class="material-icons">pause</i>'; resetTimer(); }
        else { btn.innerHTML = '<i class="material-icons">play_arrow</i>'; showControls(); }
    }

    function changeSpeed(e) {
        e.stopPropagation();
        if (player && player.setPlaybackRate) {
            currentSpeedIndex = (currentSpeedIndex + 1) % speeds.length;
            const newSpeed = speeds[currentSpeedIndex];
            player.setPlaybackRate(newSpeed);
            document.getElementById("speedDisplay").innerText = newSpeed + "x";
            resetTimer();
        }
    }

    function handleTap() { const cb = document.getElementById("controlBar"); cb.classList.contains("hidden") ? showControls() : hideControls(); }
    function showControls() { document.getElementById("controlBar").classList.remove("hidden"); resetTimer(); }
    function hideControls() { if (player && player.getPlayerState() === 1) document.getElementById("controlBar").classList.add("hidden"); }
    function resetTimer() { clearTimeout(hideTimeout); if (player && player.getPlayerState() === 1) hideTimeout = setTimeout(hideControls, 4000); }
    function togglePlay(e) { e.stopPropagation(); if(player) (player.getPlayerState() === 1) ? player.pauseVideo() : player.playVideo(); }
    function toggleFullScreen(e) { e.stopPropagation(); var container = document.getElementById("videoContainer"); if (!document.fullscreenElement) container.requestFullscreen(); else document.exitFullscreen(); }
    function handleSeek(e) { e.stopPropagation(); if(player) { var rect = e.currentTarget.getBoundingClientRect(); var pos = (e.clientX - rect.left) / rect.width; player.seekTo(player.getDuration() * pos, true); } }
    function updateUI() { if (player && player.getCurrentTime) { var curr = player.getCurrentTime(), dur = player.getDuration(); document.getElementById("currentTime").innerText = formatTime(curr); document.getElementById("duration").innerText = formatTime(dur); if (dur > 0) { var p = (curr / dur) * 100; document.getElementById("seekBarProgress").style.width = p + "%"; document.getElementById("seekBarKnob").style.left = p + "%"; } } }
    function formatTime(t) { t = Math.round(t); var m = Math.floor(t / 60), s = t % 60; return m + ":" + (s < 10 ? "0" : "") + s; }
</script>
</body>
</html>
