<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ජෛව රසායනය - Secure Player</title>
    <style>
        body { background: #000; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; color: white; overflow-x: hidden; }

        /* --- Login Screen Styles --- */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0b0b0b; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: #111; padding: 30px; border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
            width: 85%; max-width: 350px; text-align: center;
            border: 1px solid #222;
        }
        .login-box h2 { color: #ff0000; margin-bottom: 25px; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .login-box input {
            width: 100%; padding: 14px; margin: 10px 0;
            background: #1a1a1a; border: 1px solid #333;
            color: white; border-radius: 8px; box-sizing: border-box; outline: none;
        }
        .login-box input:focus { border-color: #ff0000; }
        .login-box button {
            width: 100%; padding: 14px; background: #ff0000;
            color: white; border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px;
        }
        .error-msg { color: #ff4444; font-size: 12px; margin-top: 15px; display: none; }

        /* --- Player Styles --- */
        #mainContent { display: none; padding: 10px; }
        .video-box {
            position: relative; max-width: 800px; margin: 10px auto;
            background: #000; border-radius: 12px; overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9); aspect-ratio: 16 / 9;
        }
        #player { width: 100%; height: 100%; pointer-events: none; }
        .video-box:fullscreen { max-width: 100%; width: 100%; height: 100vh; border-radius: 0; }
        .click-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; cursor: pointer; }

        /* Slim Control Bar */
        .custom-bar {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            display: flex; flex-direction: column; padding: 10px 15px; transition: 0.4s; z-index: 20;
        }
        .custom-bar.hidden { opacity: 0; transform: translateY(15px); pointer-events: none; }
        .time-display { display: flex; justify-content: space-between; font-size: 11px; color: #bbb; margin-bottom: 5px; }
        .controls-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .seek-bar { width: 100%; cursor: pointer; accent-color: #ff0000; height: 3px; margin-bottom: 8px; }
        .btn { background: #ff0000; color: white; border: none; padding: 6px 14px; cursor: pointer; font-weight: bold; border-radius: 5px; font-size: 12px; }
        .select-style { background: #222; color: white; border: 1px solid #444; padding: 4px; border-radius: 4px; font-size: 11px; }

        /* Playlist Styles */
        .playlist-container { max-width: 800px; margin: 20px auto; background: #111; border-radius: 12px; padding: 15px; border: 1px solid #222; }
        .playlist-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #ff0000; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .playlist-item { display: flex; align-items: center; padding: 12px; margin-bottom: 8px; background: #1a1a1a; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .playlist-item:hover { background: #222; }
        .playlist-item.active { background: #ff000015; border: 1px solid #ff0000; }
        .item-index { font-weight: bold; margin-right: 15px; color: #555; }
        .item-name { font-size: 14px; color: #eee; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h2>ජෛව රසායනය - Login</h2>
            <input type="text" id="username" placeholder="පරිශීලක නාමය">
            <input type="password" id="password" placeholder="මුරපදය">
            <button onclick="checkLogin()">ඇතුල් වන්න</button>
            <p id="error" class="error-msg">පරිශීලක නාමය හෝ මුරපදය වැරදියි!</p>
        </div>
    </div>

    <div id="mainContent">
        <div class="video-box" id="videoContainer">
            <div id="player"></div>
            <div class="click-layer" onclick="toggleControls()"></div>
            
            <div class="custom-bar" id="controlBar">
                <input type="range" class="seek-bar" id="seekBar" value="0" step="0.1">
                <div class="time-display">
                    <span id="currentTime">00:00</span>
                    <span id="nowPlaying" style="color: #fff; opacity: 0.8; font-size: 12px;">වීඩියෝව තෝරන්න</span>
                    <span id="duration">00:00</span>
                </div>
                <div class="controls-row">
                    <div style="display:flex; gap:8px;">
                        <button class="btn" onclick="playVideo(event)">▶ Play</button>
                        <button class="btn" style="background:#444;" onclick="pauseVideo(event)">II Pause</button>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <select class="select-style" id="speed" onchange="setSpeed(event)">
                            <option value="0.5">0.5x</option>
                            <option value="1" selected>1x Speed</option>
                            <option value="1.5">1.5x</option>
                            <option value="2">2x</option>
                        </select>
                        <button class="btn" style="background:#222;" onclick="toggleFullScreen(event)">⛶ Full Screen</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="playlist-container" id="playlist">
            <div class="playlist-title">පාඩම් මාලාව - Playlist</div>
        </div>
    </div>

<script>
    // --- Login Logic ---
    const VALID_USER = "Ulindu kawishka";
    const VALID_PASS = "200704938Uk";

    // App එක විවෘත වන විටම කලින් Login වී ඇත්දැයි පරීක්ෂා කිරීම
    document.addEventListener("DOMContentLoaded", function() {
        if (localStorage.getItem("app_authenticated") === "true") {
            showPlayer();
        }
    });

    function checkLogin() {
        const u = document.getElementById("username").value;
        const p = document.getElementById("password").value;
        const err = document.getElementById("error");

        if (u === VALID_USER && p === VALID_PASS) {
            localStorage.setItem("app_authenticated", "true"); // ලොගින් දත්ත සේව් කිරීම
            showPlayer();
        } else {
            err.style.display = "block";
        }
    }

    function showPlayer() {
        document.getElementById("loginOverlay").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
        loadYouTubeAPI();
    }

    // --- YouTube Player Logic ---
    const videoData = [
        { id: "lMR_RtHbGcw", title: "ජෛව රසායනය ( Day 01 )" },
        { id: "SOi5karTuQU", title: "ජෛව රසායනය ( Day 02 )[Part 01]" },
        { id: "2iCOyz9fWME", title: "ජෛව රසායනය ( Day 02 )[Part 02]" },
        { id: "IcMmdsa3yw8", title: "ජෛව රසායනය - Day 03" },
        { id: "pp49TELoPs0", title: "ජෛව රසායනය - Day 04" },
        { id: "AdfjiYBNDTw", title: "ජෛව රසායනය - Day 04(part 2)" },
        { id: "XH3uO16T7A0", title: "ජෛව රසායනය - Day 05" },
        { id: "hpdxRUjHJhU", title: "ජෛව රසායනය - Day 05(part2)" },
        { id: "G36isU4cPhU", title: "ජෛව රසායනය - Day 06" },
        { id: "ilScRAwcJmI", title: "ජෛව රසායනය - Day 07 Part 1" },
        { id: "9wKjkB0OUCA", title: "ජෛව රසායනය - Day 07 Part 2" }
    ];

    function loadYouTubeAPI() {
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
    }

    var player, hideTimeout, currentVidIndex = 0;
    var controlBar = document.getElementById("controlBar");

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            videoId: videoData[0].id,
            playerVars: { 'autoplay': 0, 'controls': 0, 'modestbranding': 1, 'enablejsapi': 1, 'rel': 0 },
            events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange }
        });
    }

    function onPlayerReady() {
        renderPlaylist();
        document.getElementById("nowPlaying").innerText = videoData[0].title;
        setInterval(updateUI, 500);
    }

    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.ENDED) {
            if (currentVidIndex < videoData.length - 1) loadVideo(currentVidIndex + 1);
        }
        if (event.data === YT.PlayerState.PLAYING) resetTimer();
    }

    function renderPlaylist() {
        const listDiv = document.getElementById("playlist");
        videoData.forEach((vid, index) => {
            const item = document.createElement("div");
            item.className = "playlist-item" + (index === 0 ? " active" : "");
            item.onclick = () => loadVideo(index);
            item.innerHTML = `<span class="item-index">${(index+1).toString().padStart(2,'0')}</span><span class="item-name">${vid.title}</span>`;
            listDiv.appendChild(item);
        });
    }

    function loadVideo(index) {
        currentVidIndex = index;
        player.loadVideoById(videoData[index].id);
        document.getElementById("nowPlaying").innerText = videoData[index].title;
        document.querySelectorAll(".playlist-item").forEach((el, i) => el.classList.toggle("active", i === index));
        showControls();
    }

    function toggleControls() { controlBar.classList.contains("hidden") ? showControls() : hideControls(); }
    function showControls() { controlBar.classList.remove("hidden"); resetTimer(); }
    function hideControls() { if (player.getPlayerState() === 1) controlBar.classList.add("hidden"); }
    function resetTimer() { clearTimeout(hideTimeout); if (player.getPlayerState() === 1) hideTimeout = setTimeout(hideControls, 3000); }

    function playVideo(e) { e.stopPropagation(); player.playVideo(); }
    function pauseVideo(e) { e.stopPropagation(); player.pauseVideo(); showControls(); }
    function setSpeed(e) { e.stopPropagation(); player.setPlaybackRate(parseFloat(document.getElementById("speed").value)); }
    
    function toggleFullScreen(e) {
        e.stopPropagation();
        var container = document.getElementById("videoContainer");
        if (!document.fullscreenElement) container.requestFullscreen(); else document.exitFullscreen();
    }

    function updateUI() {
        if (player && player.getCurrentTime) {
            var curr = player.getCurrentTime(), dur = player.getDuration();
            document.getElementById("currentTime").innerText = formatTime(curr);
            document.getElementById("duration").innerText = formatTime(dur);
            if (dur > 0) document.getElementById("seekBar").value = (curr / dur) * 100;
        }
    }

    function formatTime(t) {
        t = Math.round(t);
        var m = Math.floor(t / 60), s = t % 60;
        return (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
    }

    document.getElementById("seekBar").addEventListener("input", function(e) {
        player.seekTo(player.getDuration() * (this.value / 100));
    });
</script>

</body>
</html>
